<!DOCTYPE html>
<html>
<head>
<title>Online Discord RPC Simulator</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body {
    background: #313338;
    font-family: Arial;
    color: white;
}
input, button {
    padding: 8px;
    margin: 5px;
}
.card {
    background: #1e1f22;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
}
</style>
</head>
<body>

<h2>🌐 Online RPC Simulator</h2>

<input id="username" placeholder="Username#0000">
<input id="title" placeholder="Activity Title">
<input id="state" placeholder="State">
<button onclick="updateRPC()">Update</button>

<h3>Online Users</h3>
<div id="users"></div>

<script>
const socket = io();

function updateRPC() {
    const data = {
        username: document.getElementById('username').value,
        title: document.getElementById('title').value,
        state: document.getElementById('state').value
    };

    socket.emit('updateRPC', data);
}

socket.on('allUsers', (users) => {
    const container = document.getElementById('users');
    container.innerHTML = '';

    for (let id in users) {
        const user = users[id];

        const div = document.createElement('div');
        div.className = "card";
        div.innerHTML = `
            <strong>${user.username}</strong><br>
            ${user.title}<br>
            <small>${user.state}</small>
        `;
        container.appendChild(div);
    }
});
</script>

</body>
</html>
